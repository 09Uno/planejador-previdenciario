services:
  planejador:
    build: .
    container_name: planejador-mfaa
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=file:/data/planejador.db
      - JWT_SECRET=${JWT_SECRET:-mfaa-trocar-para-segredo-forte}
    volumes:
      - planejador-db:/data
      - planejador-storage:/app/apps/web/storage
    networks:
      - proxy

volumes:
  planejador-db:
  planejador-storage:

networks:
  proxy:
    external: true
